name: Convex Docker Image Build

on:
  push:
    branches:
      - convex
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to build
        required: true
        default: convex
        type: string
      image_tag:
        description: Docker tag
        required: false
        default: ''
        type: string

permissions:
  contents: read
  packages: write

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      image_name: ${{ steps.vars.outputs.image_name }}
      tag: ${{ steps.vars.outputs.tag }}
    steps:
      - name: Resolve image metadata
        id: vars
        run: |
          IMAGE_NAME="ghcr.io/${GITHUB_REPOSITORY,,}/next-convex"
          echo "image_name=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"

          if [ -n "${{ github.event.inputs.image_tag }}" ]; then
            echo "tag=${{ github.event.inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

  build-amd64:
    needs: meta
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref_name }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.convex
          platforms: linux/amd64
          push: true
          tags: |
            ${{ needs.meta.outputs.image_name }}:${{ needs.meta.outputs.tag }}-amd64
          cache-from: type=gha,scope=next-convex-amd64
          cache-to: type=gha,mode=max,scope=next-convex-amd64
          build-args: |
            NEXT_PUBLIC_CONVEX_URL=${{ secrets.NEXT_PUBLIC_CONVEX_URL || vars.NEXT_PUBLIC_CONVEX_URL || vars.CONVEX_CLOUD_ORIGIN || 'http://127.0.0.1:3210' }}
            CONVEX_URL=http://backend:3210
            CONVEX_SITE_URL=http://backend:3211

  build-arm64:
    needs: meta
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref_name }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.convex
          platforms: linux/arm64
          push: true
          tags: |
            ${{ needs.meta.outputs.image_name }}:${{ needs.meta.outputs.tag }}-arm64
          cache-from: type=gha,scope=next-convex-arm64
          cache-to: type=gha,mode=max,scope=next-convex-arm64
          build-args: |
            NEXT_PUBLIC_CONVEX_URL=${{ secrets.NEXT_PUBLIC_CONVEX_URL || vars.NEXT_PUBLIC_CONVEX_URL || vars.CONVEX_CLOUD_ORIGIN || 'http://127.0.0.1:3210' }}
            CONVEX_URL=http://backend:3210
            CONVEX_SITE_URL=http://backend:3211

  merge-manifest:
    needs: [meta, build-amd64, build-arm64]
    runs-on: ubuntu-latest
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create web multi-arch manifest
        run: |
          docker buildx imagetools create \
            -t ${{ needs.meta.outputs.image_name }}:${{ needs.meta.outputs.tag }} \
            -t ${{ needs.meta.outputs.image_name }}:latest \
            ${{ needs.meta.outputs.image_name }}:${{ needs.meta.outputs.tag }}-amd64 \
            ${{ needs.meta.outputs.image_name }}:${{ needs.meta.outputs.tag }}-arm64
